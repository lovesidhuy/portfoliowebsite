<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        .landing-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
        }

        .landing-page h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
            color: #333;
        }

        .landing-page p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .scroll-down {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .scroll-down:hover {
            background-color: #2980b9;
        }

        .resume-section {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .landing-page h1 {
                font-size: 2em;
            }

            .landing-page p {
                font-size: 1em;
            }

            .scroll-down {
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>
    <div class="landing-page">
        <h1>Welcome to My Portfolio</h1>
        <p>Explore my professional journey and achievements.</p>
        <a href="#resume" class="scroll-down">Scroll Down to View Resume</a>
    </div>
    <div id="resume" class="resume-section">
        <iframe src="lovepreetSidhu_resume_co-op.pdf" title="Your Resume"></iframe>
    </div>
</body>

</html>
